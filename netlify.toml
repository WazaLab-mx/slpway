[build]
  command = "npm ci && npm run build"
  publish = ".next"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"
  NPM_VERSION = "10"
  NPM_FLAGS = "--prefer-offline=false"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Scheduled function for news updates (daily at 7am Mexico City / 13:00 UTC)
[functions."scheduled-news-update"]
  schedule = "0 13 * * *"

# Redirects for www canonical URL
[[redirects]]
  from = "https://sanluisway.com/*"
  to = "https://www.sanluisway.com/:splat"
  status = 301
  force = true

# Headers for security
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "origin-when-cross-origin"

# CDN cache for static/ISR pages — serve stale while revalidating in background
[[headers]]
  for = "/"
  [headers.values]
    Netlify-CDN-Cache-Control = "public, max-age=300, stale-while-revalidate=3600"

[[headers]]
  for = "/events/*"
  [headers.values]
    Netlify-CDN-Cache-Control = "public, max-age=300, stale-while-revalidate=3600"

[[headers]]
  for = "/blog/*"
  [headers.values]
    Netlify-CDN-Cache-Control = "public, max-age=300, stale-while-revalidate=3600"

# Long cache for optimized images
[[headers]]
  for = "/_next/image*"
  [headers.values]
    Netlify-CDN-Cache-Control = "public, max-age=31536000, immutable"

# Long cache for static assets (JS, CSS, fonts)
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Netlify-CDN-Cache-Control = "public, max-age=31536000, immutable"
