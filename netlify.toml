[build]
  command = "npm ci && npm run build"
  publish = ".next"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"
  NPM_VERSION = "10"
  NPM_FLAGS = "--prefer-offline=false"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Scheduled function for news updates: every 6h (01/07/13/19 UTC) so a single
# failed Claude call has multiple chances to recover within the same day.
# Background variant (-background suffix) allows up to 15-min runtime — the
# Anthropic web_search round-trip can exceed the 60s sync scheduled-fn cap.
[functions."scheduled-news-update-background"]
  schedule = "0 1,7,13,19 * * *"

# Weekly newsletter scheduled trigger is intentionally disabled — newsletter
# is reviewed and triggered manually each Monday via POST to
# /api/newsletter/generate with x-admin-key header. The function file
# remains in netlify/functions/ for future re-enablement.

# Redirects for www canonical URL — collapse HTTP→HTTPS→www chain to a single
# 301 hop. PSI "Avoid multiple page redirects" previously flagged ~780ms savings
# on the HTTP-apex path (http apex → https apex → https www = 2 hops). With
# explicit protocol rules + force=true, each external entry point lands on
# the canonical host in exactly one redirect.
[[redirects]]
  from = "http://sanluisway.com/*"
  to = "https://www.sanluisway.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://www.sanluisway.com/*"
  to = "https://www.sanluisway.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://sanluisway.com/*"
  to = "https://www.sanluisway.com/:splat"
  status = 301
  force = true

# Headers for security
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "origin-when-cross-origin"

# CDN cache for static/ISR pages — serve stale while revalidating in background
[[headers]]
  for = "/"
  [headers.values]
    Netlify-CDN-Cache-Control = "public, max-age=300, stale-while-revalidate=3600"

[[headers]]
  for = "/events/*"
  [headers.values]
    Netlify-CDN-Cache-Control = "public, max-age=300, stale-while-revalidate=3600"

[[headers]]
  for = "/blog/*"
  [headers.values]
    Netlify-CDN-Cache-Control = "public, max-age=300, stale-while-revalidate=3600"

# Long cache for optimized images
[[headers]]
  for = "/_next/image*"
  [headers.values]
    Netlify-CDN-Cache-Control = "public, max-age=31536000, immutable"

# Long cache for static assets (JS, CSS, fonts)
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Netlify-CDN-Cache-Control = "public, max-age=31536000, immutable"
